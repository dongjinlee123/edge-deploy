syntax = "proto3";

package edgedeploy.v1;

option go_package = "github.com/korail/edge-deploy/proto/edgedeploy/v1";

import "google/protobuf/timestamp.proto";
import "edgedeploy/v1/common.proto";

// ---------------------------------------------------------------------------
// Device Registration (one-time provisioning, plain TLS)
// ---------------------------------------------------------------------------

service EdgeRegistration {
  // Register provisions a new edge device: validates the provisioning token,
  // signs the device's CSR, and returns signed cert + CA cert.
  rpc Register(RegisterRequest) returns (RegisterResponse);
}

message RegisterRequest {
  string provisioning_token = 1;
  string device_name        = 2;
  // PEM-encoded PKCS#10 CSR generated by the agent on first boot.
  string csr_pem            = 3;
}

message RegisterResponse {
  string device_uuid   = 1;
  // PEM-encoded signed device certificate.
  string cert_pem      = 2;
  // PEM-encoded CA certificate (for verifying controller's server cert).
  string ca_cert_pem   = 3;
}

// ---------------------------------------------------------------------------
// Bidirectional Command Stream (requires mTLS after Phase 3)
// ---------------------------------------------------------------------------

service EdgeControl {
  // CommandStream is the single long-lived bidi stream between controller and
  // edge agent. The agent opens it on startup; the controller sends commands
  // and the agent sends back reports (heartbeats, acks, status snapshots).
  rpc CommandStream(stream EdgeReport) returns (stream EdgeCommand);
}

// ---------------------------------------------------------------------------
// EdgeReport — messages flowing FROM agent TO controller
// ---------------------------------------------------------------------------

message EdgeReport {
  string device_uuid = 1;
  oneof payload {
    Heartbeat        heartbeat         = 2;
    StatusReport     status_report     = 3;
    CommandAck       command_ack       = 4;
    ResourceSnapshot resource_snapshot = 5;
    LogChunk         log_chunk         = 6;
  }
}

message Heartbeat {
  google.protobuf.Timestamp ts            = 1;
  string                    agent_version = 2;
  uint32                    config_version = 3;
  // Brief system stats.
  double cpu_usage_percent   = 4;
  double memory_usage_percent = 5;
}

message StatusReport {
  string device_uuid = 1;
  string status      = 2;  // "online" | "degraded" | "offline"
  string message     = 3;
  google.protobuf.Timestamp ts = 4;
}

message CommandAck {
  string command_id = 1;
  bool   success    = 2;
  string message    = 3;
  // Optional structured result (JSON-encoded).
  string result_json = 4;
}

message ResourceSnapshot {
  string command_id = 1;  // correlates to GetResourcesCommand
  string namespace  = 2;
  // JSON-encoded list of resource summaries.
  string resources_json = 3;
}

message LogChunk {
  string command_id = 1;  // correlates to GetPodLogsCommand
  string pod_name   = 2;
  string namespace  = 3;
  bytes  data       = 4;
  bool   eof        = 5;
}

// ---------------------------------------------------------------------------
// EdgeCommand — messages flowing FROM controller TO agent
// ---------------------------------------------------------------------------

message EdgeCommand {
  string command_id = 1;  // UUID for ack correlation
  oneof payload {
    ApplyManifestsCommand    apply_manifests    = 2;
    DeleteResourceCommand    delete_resource    = 3;
    RestartDeploymentCommand restart_deployment = 4;
    GetResourcesCommand      get_resources      = 5;
    GetPodLogsCommand        get_pod_logs       = 6;
    ConfigSyncCommand        config_sync        = 7;
  }
}

message ApplyManifestsCommand {
  string manifests  = 1;  // YAML (potentially multi-document)
  string namespace  = 2;
}

message DeleteResourceCommand {
  string namespace = 1;
  string kind      = 2;
  string name      = 3;
}

message RestartDeploymentCommand {
  string namespace = 1;
  string name      = 2;
}

message GetResourcesCommand {
  string namespace = 1;
}

message GetPodLogsCommand {
  string namespace = 1;
  string pod_name  = 2;
  int32  tail      = 3;
}

message ConfigSyncCommand {
  // Full desired state as JSON. Agent reconciles against actual K8s state.
  string desired_config_json = 1;
  uint32 config_version      = 2;
}
