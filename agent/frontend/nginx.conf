server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback — all routes served by React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Admin REST (provisioning tokens only) — still backed by FastAPI
    location /api/ {
        proxy_pass http://controller:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # gRPC-Web — forward to Envoy (container-to-container, never exposed externally)
    location /edgedeploy.v1. {
        proxy_pass http://envoy:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
        proxy_buffering off;
    }
}
